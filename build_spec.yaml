version: 0.1
component: build
timeoutInSeconds: 600
shell: bash

env:
  variables:
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk

  exportedVariables:
    - BuildServiceDemoVersion

steps:
  - type: Command
    name: "Set PATH Variable"
    command: export PATH=$JAVA_HOME/bin:$PATH;
             java -version

  - type: Command
    name: "Docker Login"
    command:  cd MtdrSpring;
              oci os object get --bucket-name reacttodo-ukcyd --name deployment_config.tgz --file deployment_config.tgz;
              tar -xzvf deployment_config.tgz;
              source env.sh;
              cat at.cfg | docker login -u "axe5wdod0see/a00840038@tec.mx" --password-stdin mx-queretaro-1.ocir.io

  - type: Command
    name: "Build"
    command:  cd MtdrSpring;
              source env.sh;
              (cd backend;source build.sh)
