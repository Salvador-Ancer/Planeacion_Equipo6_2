name: Lint Code Base

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Lint Code Base
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Super Linter
        uses: super-linter/super-linter@v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          # Desactivar linters que no aplican al proyecto
          VALIDATE_CHECKOV: false
          VALIDATE_JSCPD: false
          VALIDATE_YAML_PRETTIER: false
          # Linters útiles para Node.js / JavaScript
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_JSON: true
